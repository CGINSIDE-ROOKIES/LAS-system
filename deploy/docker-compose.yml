  #     - EMBEDDING_BACKEND=${EMBEDDING_BACKEND:-cpu}
  #     - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-CPU}
  #     - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
  #     - QDRANT_COLLECTION=${QDRANT_COLLECTION:-law_article}
  #     - QDRANT_API_KEY=${QDRANT_API_KEY:-}
  #     - QDRANT_VECTOR_NAME_MAP=${QDRANT_VECTOR_NAME_MAP:-}
  #     - OPENSEARCH_URL=${OPENSEARCH_URL:-http://opensearch:9200}
  #     - OPENSEARCH_INDEX=${OPENSEARCH_INDEX:-las_legal_docs}
  #     - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-}
  #     - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend-api:8000}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - HOSTNAME=0.0.0.0
      - ALLOWED_FRAME_ORIGINS=${ALLOWED_FRAME_ORIGINS:-}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend-api:8000}
