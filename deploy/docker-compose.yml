services:
  postgres:
    image: postgres:15
    container_name: las-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-las}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-las}
      POSTGRES_DB: ${POSTGRES_DB:-las}
    volumes:
      - las-postgres-data:/var/lib/postgresql/data
      - ../apps/backend/api/migrations/001_create_qa_history.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend-api:
    image: ghcr.io/cginside-rookies/las-system/backend-api:dev
    container_name: las-backend-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env.backend-api
    depends_on:
      - postgres

  backend-doc-pipeline:
    image: ghcr.io/cginside-rookies/las-system/backend-doc-pipeline:dev
    container_name: las-doc-pipeline
    restart: unless-stopped
    ports:
      - "8123:8123"
    env_file: .env.doc-pipeline

  frontend:
    image: ghcr.io/cginside-rookies/las-system/frontend:dev
    container_name: las-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ALLOWED_FRAME_ORIGINS=${ALLOWED_FRAME_ORIGINS:-}

volumes:
  las-postgres-data:
