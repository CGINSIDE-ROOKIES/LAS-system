# Coolify runs this file with `--project-directory` set to the repo root,
# so build contexts here must stay repo-root-relative.

services:
  backend-api:
    build:
      context: apps/backend
      dockerfile: api/Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS:-1024}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_API_URL=${GEMINI_API_URL:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - QUERY_PARSER_MODEL=${QUERY_PARSER_MODEL:-}
      - QUERY_PARSER_TIMEOUT=${QUERY_PARSER_TIMEOUT:-10}
      - QUERY_PARSER_STRICT=${QUERY_PARSER_STRICT:-false}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_COLLECTIONS=${QDRANT_COLLECTIONS:-law_article,legal_case,legal_relation}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_VECTOR_NAME_MAP=${QDRANT_VECTOR_NAME_MAP:-law_article=body}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://opensearch:9200}
      - OPENSEARCH_INDEX=${OPENSEARCH_INDEX:-law_article,legal_case,legal_relation}
      - OPENSEARCH_API_KEY=${OPENSEARCH_API_KEY:-}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}
      - OPENSEARCH_SEARCH_TEXT_FIELD=${OPENSEARCH_SEARCH_TEXT_FIELD:-search_text}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CHAT_COMPLETIONS_URL=${LLM_CHAT_COMPLETIONS_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LAW_SLOT_SCORE_THRESHOLD=${LAW_SLOT_SCORE_THRESHOLD:-0.55}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@postgres:5432/las}
      - DOCUMENT_REVIEW_STORAGE_DIR=${DOCUMENT_REVIEW_STORAGE_DIR:-/app/storage/document_reviews}
      - DOC_PROCESSOR_LLM_PROVIDER=${DOC_PROCESSOR_LLM_PROVIDER:-}
      - DOC_PROCESSOR_LLM_MODEL=${DOC_PROCESSOR_LLM_MODEL:-}
      - DOC_PROCESSOR_LLM_BASE_URL=${DOC_PROCESSOR_LLM_BASE_URL:-}
      - DOC_PROCESSOR_LLM_API_KEY=${DOC_PROCESSOR_LLM_API_KEY:-}
      - DOC_PROCESSOR_LLM_STRUCTURED_METHOD=${DOC_PROCESSOR_LLM_STRUCTURED_METHOD:-json_mode}
    volumes:
      - document-review-storage:/app/storage/document_reviews

  law-updater:
    build:
      context: apps/backend/law-updater
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - LAW_OC=${LAW_OC:-}
      - LAW_API_BASE_URL=${LAW_API_BASE_URL:-}
      - EMBEDDING_MODEL=${LAW_UPDATER_EMBEDDING_MODEL:-text-embedding-3-large}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${LAW_UPDATER_OPENAI_BASE_URL:-}
      - OPENAI_EMBEDDING_DIMENSIONS=${LAW_UPDATER_OPENAI_EMBEDDING_DIMENSIONS:-}
      - OPENAI_MAX_INPUT_TOKENS=${LAW_UPDATER_OPENAI_MAX_INPUT_TOKENS:-8192}
      - OPENAI_MAX_BATCH_TOKENS=${LAW_UPDATER_OPENAI_MAX_BATCH_TOKENS:-300000}
      - OPENAI_MAX_RETRIES=${LAW_UPDATER_OPENAI_MAX_RETRIES:-5}
      - OPENAI_RETRY_BASE_DELAY_SEC=${LAW_UPDATER_OPENAI_RETRY_BASE_DELAY_SEC:-1.0}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://opensearch:9200}
      - OPENSEARCH_API_KEY=${OPENSEARCH_API_KEY:-}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}
    volumes:
      - law-updater-data:/app/data
    command: ["python", "-m", "http.server", "8080", "--bind", "0.0.0.0", "--directory", "/tmp"]

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - HOSTNAME=0.0.0.0
      - ALLOWED_FRAME_ORIGINS=${ALLOWED_FRAME_ORIGINS:-}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend-api:8000}

volumes:
  law-updater-data:
  document-review-storage:
