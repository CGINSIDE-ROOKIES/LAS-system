services:
  neo4j:
    image: neo4j:community
    container_name: legal-pipeline-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${SERVICE_USER_NEO4J:-neo4j}/${SERVICE_PASSWORD_NEO4J}"
      NEO4J_dbms_default__database: "${NEO4J_DATABASE:-neo4j}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-1G}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
  neo4j_logs:
